interface:
  display_name: Kami Flow Core
  short_description: Intent-driven workflow router for client repos with a repo contract in AGENTS.md, a human project brief, and local plan helpers; the kamiflow-core source repo is the source-repo exception.
  default_prompt: Use Kami Flow Core to read AGENTS.md, the project brief, and the active plan in that order, infer the right route, and produce an evidence-backed next step. Treat client repos as the default target and the kamiflow-core source repo as the source-repo exception.
policy:
  allow_implicit_invocation: false
